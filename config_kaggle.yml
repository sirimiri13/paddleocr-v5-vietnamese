Global:
  debug: false
  use_gpu: true
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 100
  save_model_dir: /kaggle/working/paddleocr-v5-vietnamese/output/vi_ppocr_v5
  save_epoch_step: 5
  eval_batch_step: [0, 2000]
  cal_metric_during_train: true
  pretrained_model: /kaggle/working/paddleocr-v5-vietnamese/pretrain_models/ch_PP-OCRv5_rec_train/best_accuracy
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: /kaggle/working/paddleocr-v5-vietnamese/dict/vi_dict.txt
  max_text_length: &max_text_length 40
  infer_mode: false
  use_space_char: true
  distributed: true
  save_res_path: /kaggle/working/paddleocr-v5-vietnamese/output/predicts.txt

Optimizer:
  name: AdamW
  beta1: 0.9
  beta2: 0.999
  epsilon: 1.0e-08
  weight_decay: 0.05
  no_weight_decay_name: norm pos_embed
  one_dim_param_no_weight_decay: true
  lr:
    name: Cosine
    learning_rate: 0.0005
    warmup_epoch: 2
  regularizer:
    name: L2
    factor: 0

Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
    det: false
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: true
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
        weight: 1.0
    - NRTRLoss:
        weight: 1.0
        smoothing: true

PostProcess:
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: false

Train:
  dataset:
    name: MultiScaleDataSet
    ds_width: false
    data_dir: /kaggle/working/paddleocr-v5-vietnamese/data/
    ext_op_transform_idx: 1
    label_file_list:
      - /kaggle/working/paddleocr-v5-vietnamese/data/train_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - RecAug:
          aug_prob: 0.4
      - RecConAug:
          prob: 0.5
          image_shape: [48, 320, 3]
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - label_sar
            - length
            - valid_ratio
  sampler:
    name: MultiScaleSampler
    scales: [[320, 32], [320, 48], [320, 64]]
    first_bs: &bs 96
    fix_bs: false
    divided_factor: [8, 16]
    is_training: true
  loader:
    shuffle: true
    batch_size_per_card: *bs
    drop_last: true
    num_workers: 2
    use_shared_memory: true

Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /kaggle/working/paddleocr-v5-vietnamese/data/
    label_file_list:
      - /kaggle/working/paddleocr-v5-vietnamese/data/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 320]
          padding: false
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - label_sar
            - length
            - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 96
    num_workers: 2
